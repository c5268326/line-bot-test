name: 更新業績資料

on:
  # 手動觸發
  workflow_dispatch:

  # 平日台灣時間 07:30～17:30，每60分鐘執行一次
  # 07:30 = UTC 23:30 前一天（週一~週五對應 UTC 週日~週四）
  # 08:30～17:30 = UTC 00:30～09:30（週一~週五）
  schedule:
    - cron: "30 23 * * 0-4"
    - cron: "30 0-9 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install google-auth google-auth-oauthlib google-api-python-client openpyxl xlrd requests

      - name: 抓取 Gmail 最新 Excel 並更新業績資料
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_gmail.py

      - name: 提交並推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance.json
          git diff --cached --quiet || git commit -m "自動更新業績資料 $(TZ='Asia/Taipei' date '+%Y/%m/%d %H:%M')"
          git push

      - name: 寄送執行完成通知
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, json
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          TW = timezone(timedelta(hours=8))
          now = datetime.now(TW).strftime("%Y/%m/%d %H:%M")

          try:
              with open("data/performance.json", encoding="utf-8") as f:
                  data = json.load(f)
              updated = data.get("updated_at", "－")
              broadcast = "✅ 已廣播" if data.get("last_broadcast_date") == datetime.now(TW).strftime("%Y/%m/%d") else "⏭️ 略過廣播"
          except Exception:
              updated = "－"
              broadcast = "不明"

          body = f"""南山業績 LINE Bot 執行完成

執行時間：{now}
資料時間：{updated}
廣播狀態：{broadcast}

https://github.com/c5268326/line-bot-test/actions
"""
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"✅ 業績更新完成 {now}"
          msg["From"] = user
          msg["To"] = user

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(user, password)
              smtp.send_message(msg)
          print("✅ 通知信已寄出")
          EOF
