name: 更新業績資料

on:
  # 手動觸發
  workflow_dispatch:

  # 每天台灣時間 08:00 自動執行（UTC 00:00）
  schedule:
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install google-auth google-auth-oauthlib google-api-python-client openpyxl

      - name: 抓取 Gmail 最新 Excel 並更新業績資料
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_gmail.py

      - name: 提交並推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance.json
          git diff --cached --quiet || git commit -m "自動更新業績資料 $(TZ='Asia/Taipei' date '+%Y/%m/%d %H:%M')"
          git push
